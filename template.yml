              Resource:
                - !Sub arn:aws:s3:::${WebsiteBucketPrefix}-${AWS::AccountId}-${AWS::Region}
                - !Sub arn:aws:s3:::${WebsiteBucketPrefix}-${AWS::AccountId}-${AWS::Region}/*
                - !Sub arn:aws:s3:::dvsa-receipts-bucket-${AWS::AccountId}-${AWS::Region}
                - !Sub arn:aws:s3:::dvsa-receipts-bucket-${AWS::AccountId}-${AWS::Region}/*
                - !Sub arn:aws:s3:::dvsa-feedback-bucket-${AWS::AccountId}-${AWS::Region}
                - !Sub arn:aws:s3:::dvsa-feedback-bucket-${AWS::AccountId}-${AWS::Region}/*
            - Sid: CognitoScopedAdmin
              Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminUpdateUserAttributes
                - cognito-idp:ListUsers
              Resource: !GetAtt CognitoUserPoolDvsaUserPool.Arn

  InitializeApplication:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken:
         Fn::GetAtt: [ "InitCustomFunction" , "Arn" ]

Outputs:
  WebsiteURL:
    Description: DVSA Website URL
    Value: !Sub http://${WebsiteBucketPrefix}-${AWS::AccountId}-${AWS::Region}.s3-website.${AWS::Region}.amazonaws.com
